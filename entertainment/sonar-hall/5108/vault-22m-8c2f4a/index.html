<style>
  :root {
    --bg: #0a0a0f;
    --card: #14141c;
    --gold: #d4af37;
    --gold-soft: #e8c97a;
    --gold-glow: rgba(212, 175, 55, 0.15);
    --text: #f5f5f7;
    --muted: #a8a8b3;
    --border: rgba(255, 255, 255, 0.08);
    --danger: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  body {
    background:
      radial-gradient(ellipse at top right, rgba(212, 175, 55, 0.08), transparent 50%),
      radial-gradient(ellipse at bottom left, rgba(255, 107, 53, 0.05), transparent 50%),
      var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .gate {
    width: 100%;
    max-width: 440px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .gate::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .lock-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 24px;
    border-radius: 50%;
    background: var(--gold-glow);
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    font-weight: 600;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  .sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 32px;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  input[type=password] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    letter-spacing: 0.05em;
    transition: border-color 200ms, background 200ms;
    text-align: center;
  }
  input[type=password]:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(212, 175, 55, 0.04);
  }
  button {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), var(--gold-soft));
    color: #0a0a0f;
    border: none;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 150ms ease, box-shadow 200ms ease;
    font-family: inherit;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212, 175, 55, 0.18); }
  button:disabled { opacity: 0.5; cursor: wait; }
  .err {
    color: var(--danger);
    font-size: 13px;
    margin-top: 12px;
    opacity: 0;
    transition: opacity 200ms;
    min-height: 18px;
  }
  .err.show { opacity: 1; }
  .foot {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    line-height: 1.6;
  }
</style>
</head>

<script>
(function() {
  const ITER = 600000;
  const b64 = document.getElementById('payload').textContent.replace(/\s+/g, '');
  function b64ToBytes(str) {
    const bin = atob(str);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }
  const raw = b64ToBytes(b64);
  const salt = raw.slice(0, 16);
  const iv = raw.slice(16, 28);
  const ctTag = raw.slice(28);

  const form = document.getElementById('f');
  const input = document.getElementById('p');
  const btn = document.getElementById('b');
  const err = document.getElementById('err');

  async function deriveKey(password) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: ITER, hash: 'SHA-256' },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false, ['decrypt']
    );
  }

  async function tryUnlock(password) {
    try {
      const key = await deriveKey(password);
      const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ctTag);
      const html = new TextDecoder('utf-8').decode(plaintext);
      // Reemplaza el documento entero con el contenido descifrado
      document.open();
      document.write(html);
      document.close();
      return true;
    } catch (e) {
      return false;
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Descifrando...';
    const ok = await tryUnlock(input.value);
    if (!ok) {
      btn.disabled = false;
      btn.textContent = 'Abrir documento';
      err.textContent = 'Contraseña incorrecta.';
      err.classList.add('show');
      input.value = '';
      input.focus();
    }
  });

  input.focus();
})();
</script>
